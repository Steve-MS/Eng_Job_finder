# Mech-PM-Finder source configuration
# Crawl-delay is seconds the orchestrator sleeps between adapters.
# Additional intra-source page delays are handled inside each adapter.

[sources.reed]
enabled = true
crawl_delay = 0
results_to_take = 100
safety_cap = 500

# Multi-query: adapter iterates this list, unions results, deduplicates by jobId.
keywords_list = [
    "project manager mechanical",
    "project manager HVAC",
    "project manager M&E building services",
    "engineering project manager contract",
    "assurance engineer mechanical",
    "document controller engineering",
    "project engineer mechanical",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor contract",
    "risk manager engineering contract",
    "commercial manager contract",
    "operations director contract",
    "sustainability lead contract",
    "executive coach contract",
    "bid writer tender writer contract",
    "business improvement manager contract",
    "project planner mechanical",
]
location = ""

# Akamai Bot Manager protects all StepStone-family sites (Totaljobs, CWJobs).
# Live probe 2026-06-15: HTTP 200 with stripped body (~98KB, 0 job cards)
# and `_abck` session cookie marked unvalidated (~-1~). Fixture parsing
# works (16/16 tests pass against captured HTML) but live fetch returns no
# listings. Disabled pending alternative strategy — see
# .squad/decisions/inbox/michael-stepstone-akamai-blocked.md.
[sources.totaljobs]
enabled = false
crawl_delay = 3
domain = "www.totaljobs.com"
# /jobs/project-manager/engineering-jobs returned HTTP 500 (stale path).
# Confirmed working 2026-06-15: /jobs/project-manager/in-uk returns 200 + 25 cards.
search_path = "/jobs/project-manager/in-uk"

[sources.cwjobs]
enabled = false
crawl_delay = 3
domain = "www.cwjobs.co.uk"
search_path = "/jobs/project-manager/in-uk"

[sources.railwaypeople]
enabled = true
crawl_delay = 10
# v0.4 (2026-06-18): keywords_list drives multi-query search.
# Base URL format: ?keywords={keyword}&jobtype=contract
keywords_list = [
    "project manager",
    "project planner",
    "risk manager",
    "commercial manager",
    "quantity surveyor",
    "operations director",
    "project engineer",
    "programme manager",
]

[sources.energy_jobline]
enabled = true
crawl_delay = 10
# 5 pages × 4 queries = up to 20 page fetches (10 s crawl-delay each).
max_pages_per_query = 5
location = "United Kingdom"
contract_type = "contract"

# Keywords deliberately omit "United Kingdom" to avoid over-restricting EJL's
# text-search.  Geo-filtering is handled at two levels:
#   1. ?location=United+Kingdom URL param (partial — EJL returns some global results).
#   2. Adapter-level _is_clearly_non_uk() post-fetch guard (drops confirmed non-UK).
keywords_list = [
    "project manager mechanical",
    "project manager HVAC M&E",
    "project manager energy oil gas",
    "project engineer mechanical offshore",
    "assurance engineer",
    "document controller",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor energy",
    "risk manager energy contract",
    "commercial manager contract",
    "sustainability lead energy",
    "project planner",
]

[sources.the_engineer]
# Cloudflare-protected — disabled 2026-06-15 pending alternative strategy
enabled = false
crawl_delay = 5

[sources.aviation_job_search]
enabled = true
crawl_delay = 3

[sources.adzuna]
enabled = true
crawl_delay = 3
country = "gb"
results_per_page = 50
max_pages = 4
safety_cap = 200

# OR query — matches listings containing ANY of these terms
what_or = "project manager mechanical HVAC M&E building services engineering assurance controller quantity surveyor risk manager commercial manager sustainability operations director bid writer"
# Exclude — kills IT/software noise at source
what_exclude = "software developer devops cloud SAP ERP digital IT"
contract = 1
location0 = "UK"
category = "engineering-jobs"

[sources.michael_page]
enabled = true
crawl_delay = 5
# max_pages_per_query: pages fetched per keyword (30 results/page, Drupal pagination).
max_pages_per_query = 3
# Only Drupal-configured path slugs return results (spaces→hyphens).
# Confirmed working 2026-06-17: project-manager, project-engineer,
# project-director, contracts-manager, programme-manager.
keywords_list = [
    "project-manager",
    "project-engineer",
    "project-director",
    "contracts-manager",
    "programme-manager",
    # v0.4 broad role expansion (2026-06-18)
    "quantity-surveyor",
    "risk-manager",
    "commercial-manager",
    "project-planner",
    "operations-director",
    "sustainability-lead",
]

[sources.manpower_group]
enabled = true
crawl_delay = 5
# Manpower Group search: standard HTML, 6 results/page, ~3 pages per query.
# No contract-type URL filter — contract_type_raw is None in search cards;
# the extractor scans description snippets for perm/contract signals.
max_pages_per_query = 5
keywords_list = [
    "project manager engineering",
    "project engineer mechanical",
    "project director",
    "document controller",
    "assurance engineer",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor",
    "risk manager",
    "commercial manager",
    "sustainability lead",
    "bid writer",
    "project planner",
]

# Phenom ATS platform — BAM Careers + Mace Group
# Both sites run Phenom People (same tech: phenomtrack.min.js, /widgets endpoint).
# Confirmed live recon 2026-06-17: 200 OK, no bot protection, jobs embedded as JSON.
# robots.txt: permissive — only /chatbot, /iauth, /socialAuth disallowed.
[sources.bam_careers]
enabled = true
crawl_delay = 5
adapter = "phenom"
domain = "www.bamcareers.com"
site_path = "/uk/en"
employer_name = "BAM Construction"
max_pages_per_query = 5
keywords_list = [
    "project manager",
    "project engineer",
    "document controller",
    "assurance",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor",
    "risk manager",
    "commercial manager",
    "project planner",
]

[sources.mace_group]
enabled = true
crawl_delay = 5
adapter = "phenom"
domain = "careers.macegroup.com"
site_path = "/gb/en"
employer_name = "Mace Group"
max_pages_per_query = 5
keywords_list = [
    "project manager",
    "project engineer",
    "document controller",
    "assurance",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor",
    "risk manager",
    "commercial manager",
    "project planner",
]

# Advance TRS — WordPress / WP Job Manager REST API.
# Endpoint: GET /wp-json/wp/v2/job-listings?job-types=7&per_page=100&page=N
# job-types=7 filters to Contract roles only. No keyword search available;
# all 102 contract roles are fetched across 2 pages and downstream pipeline
# applies role/keyword filters.
# robots.txt: allows crawlers; no bot protection observed (2026-06-18).
[sources.advance_trs]
enabled = true
crawl_delay = 3

# Drupal/Jobiqo job boards — 3 sites sharing the same URL pattern.
# Building4Jobs uses Jobiqo/Next.js (__NEXT_DATA__ JSON extraction).
# NCE Careers and Careers in Construction use Drupal Epiq Jobs HTML scrape.
# robots.txt: all 3 sites allow crawling of /jobs paths.
[sources.building4jobs]
enabled = true
crawl_delay = 5
platform = "jobiqo"
base_url = "https://www.building4jobs.com"
max_pages_per_query = 5
keywords_list = [
    "project manager",
    "project engineer",
    "contracts manager",
    "programme manager",
    "quantity surveyor",
    "commercial manager",
    "project director",
    "project planner",
]

[sources.nce_careers]
enabled = true
crawl_delay = 5
platform = "drupal_epiq"
base_url = "https://www.newcivilengineercareers.com"
max_pages_per_query = 5
keywords_list = [
    "project manager",
    "project engineer",
    "contracts manager",
    "programme manager",
    "quantity surveyor",
    "commercial manager",
]

[sources.careers_in_construction]
enabled = true
crawl_delay = 5
platform = "drupal_epiq"
base_url = "https://www.careersinconstruction.com"
max_pages_per_query = 5
keywords_list = [
    "project manager",
    "project engineer",
    "contracts manager",
    "programme manager",
    "quantity surveyor",
    "commercial manager",
]

# Turner & Townsend — SmartRecruiters-backed JSON API (no auth required).
# POST /api/careers/searchvacancies with countries: ["United Kingdom"].
# robots.txt: permissive (only /umbraco/ and auth paths blocked).
# enrich_detail: GET each listing's SmartRecruiters ref URL for contract_type
# and full job description. Adds ~1 s per listing; disabled by default.
[sources.turner_townsend]
enabled = true
crawl_delay = 3
max_pages_per_query = 5
enrich_detail = false
keywords_list = [
    "project manager",
    "project director",
    "construction manager",
    "commissioning manager",
    "project engineer",
    "programme manager",
    "contracts manager",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor",
    "risk manager",
    "commercial manager",
    "project planner",
    "sustainability lead",
    "operations director",
]
