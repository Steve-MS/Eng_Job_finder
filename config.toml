# Mech-PM-Finder source configuration
# Crawl-delay is seconds the orchestrator sleeps between adapters.
# Additional intra-source page delays are handled inside each adapter.

[sources.reed]
enabled = true
crawl_delay = 0
results_to_take = 100
safety_cap = 500

# Multi-query: adapter iterates this list, unions results, deduplicates by jobId.
keywords_list = [
    "project manager mechanical",
    "project manager HVAC",
    "project manager M&E building services",
    "engineering project manager contract",
    "assurance engineer mechanical",
    "document controller engineering",
    "project engineer mechanical",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor contract",
    "risk manager engineering contract",
    "commercial manager contract",
    "operations director contract",
    "sustainability lead contract",
    "executive coach contract",
    "bid writer tender writer contract",
    "business improvement manager contract",
    "project planner mechanical",
    "compliance manager contract",
]
location = ""

# Akamai Bot Manager protects all StepStone-family sites (Totaljobs, CWJobs).
# Live probe 2026-06-15: HTTP 200 with stripped body (~98KB, 0 job cards)
# and `_abck` session cookie marked unvalidated (~-1~). Fixture parsing
# works (16/16 tests pass against captured HTML) but live fetch returns no
# listings. Disabled pending alternative strategy — see
# .squad/decisions/inbox/michael-stepstone-akamai-blocked.md.
[sources.totaljobs]
enabled = false
crawl_delay = 3
domain = "www.totaljobs.com"
# /jobs/project-manager/engineering-jobs returned HTTP 500 (stale path).
# Confirmed working 2026-06-15: /jobs/project-manager/in-uk returns 200 + 25 cards.
search_path = "/jobs/project-manager/in-uk"

[sources.cwjobs]
enabled = false
crawl_delay = 3
domain = "www.cwjobs.co.uk"
search_path = "/jobs/project-manager/in-uk"

[sources.railwaypeople]
enabled = true
crawl_delay = 10
# v0.4 (2026-06-18): keywords_list drives multi-query search.
# Base URL format: ?keywords={keyword}&jobtype=contract
keywords_list = [
    "project manager",
    "project planner",
    "risk manager",
    "commercial manager",
    "quantity surveyor",
    "operations director",
    "project engineer",
    "programme manager",
    "compliance manager",
]

[sources.energy_jobline]
enabled = true
crawl_delay = 10
# 5 pages × 4 queries = up to 20 page fetches (10 s crawl-delay each).
max_pages_per_query = 5
location = "United Kingdom"
contract_type = "contract"

# Keywords deliberately omit "United Kingdom" to avoid over-restricting EJL's
# text-search.  Geo-filtering is handled at two levels:
#   1. ?location=United+Kingdom URL param (partial — EJL returns some global results).
#   2. Adapter-level _is_clearly_non_uk() post-fetch guard (drops confirmed non-UK).
keywords_list = [
    "project manager mechanical",
    "project manager HVAC M&E",
    "project manager energy oil gas",
    "project engineer mechanical offshore",
    "assurance engineer",
    "document controller",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor energy",
    "risk manager energy contract",
    "commercial manager contract",
    "sustainability lead energy",
    "project planner",
    "compliance manager contract",
]

[sources.the_engineer]
# Cloudflare-protected — disabled 2026-06-15 pending alternative strategy
enabled = false
crawl_delay = 5

[sources.aviation_job_search]
enabled = true
crawl_delay = 3

[sources.adzuna]
enabled = true
crawl_delay = 3
country = "gb"
results_per_page = 50
max_pages = 4
safety_cap = 200

# OR query — matches listings containing ANY of these terms
what_or = "project manager mechanical HVAC M&E building services engineering assurance controller quantity surveyor risk manager commercial manager sustainability operations director bid writer"
# Exclude — kills IT/software noise at source
what_exclude = "software developer devops cloud SAP ERP digital IT"
contract = 1
location0 = "UK"
category = "engineering-jobs"

[sources.michael_page]
enabled = true
crawl_delay = 5
# max_pages_per_query: pages fetched per keyword (30 results/page, Drupal pagination).
max_pages_per_query = 3
# Only Drupal-configured path slugs return results (spaces→hyphens).
# Confirmed working 2026-06-17: project-manager, project-engineer,
# project-director, contracts-manager, programme-manager.
keywords_list = [
    "project-manager",
    "project-engineer",
    "project-director",
    "contracts-manager",
    "programme-manager",
    # v0.4 broad role expansion (2026-06-18)
    "quantity-surveyor",
    "risk-manager",
    "commercial-manager",
    "project-planner",
    "operations-director",
    "sustainability-lead",
    "compliance-manager",
]

[sources.manpower_group]
enabled = true
crawl_delay = 5
# Manpower Group search: standard HTML, 6 results/page, ~3 pages per query.
# No contract-type URL filter — contract_type_raw is None in search cards;
# the extractor scans description snippets for perm/contract signals.
max_pages_per_query = 5
keywords_list = [
    "project manager engineering",
    "project engineer mechanical",
    "project director",
    "document controller",
    "assurance engineer",
    # v0.4 broad role expansion (2026-06-18)
    "quantity surveyor",
    "risk manager",
    "commercial manager",
    "sustainability lead",
    "bid writer",
    "project planner",
    "compliance manager",
]

