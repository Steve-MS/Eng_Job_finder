# RailRecruiter — UK rail-sector job board (www.railrecruiter.co.uk).
# ASP.NET WebForms site with browser-fingerprint challenge (/_xhrc.ashx).
# Session setup: GET /jobs/ → POST /_xhrc.ashx → GET clean search URL.
# Search URL format: /jobs/job-search-results/kw-{keyword-slug}/co-225/
# robots.txt: Crawl-delay 0.2 (we use 3 s for politeness; ClaudeBot blocked
# so Chrome UA is sent). Discovery probe: 2026-06-19.
[sources.railrecruiter]
enabled = true
crawl_delay = 3
base_url = "https://www.railrecruiter.co.uk"
max_pages_per_query = 5
keywords_list = [
    "project manager",
    "project director",
    "programme manager",
    "quantity surveyor",
    "risk manager",
    "commercial manager",
    "operations director",
    "project planner",
    "compliance manager",
]

