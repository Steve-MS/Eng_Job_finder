# Mech-PM-Finder source configuration
# Crawl-delay is seconds the orchestrator sleeps between adapters.
# Additional intra-source page delays are handled inside each adapter.

[sources.reed]
enabled = true
crawl_delay = 0
keywords = "project manager mechanical engineering"
location = ""
results_to_take = 100
safety_cap = 500

[sources.totaljobs]
enabled = true
crawl_delay = 3
domain = "www.totaljobs.com"
search_path = "/jobs/project-manager/engineering-jobs"

[sources.cwjobs]
enabled = true
crawl_delay = 3
domain = "www.cwjobs.co.uk"
search_path = "/jobs/project-manager/in-uk"

[sources.railwaypeople]
enabled = true
crawl_delay = 10

[sources.energy_jobline]
enabled = true
crawl_delay = 10

[sources.the_engineer]
enabled = true
crawl_delay = 5

[sources.aviation_job_search]
enabled = true
